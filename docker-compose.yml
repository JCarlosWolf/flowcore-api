version: "3.9"

services:
  db:
    image: postgres:15
    container_name: flowcore_db
    restart: always
    environment:
      POSTGRES_USER: flowcore_user
      POSTGRES_PASSWORD: flowcore_pass
      POSTGRES_DB: flowcore
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: flowcore_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: flowcore_user
      DB_PASSWORD: flowcore_pass
      DB_NAME: flowcore
      SECRET_KEY: super_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

volumes:
  postgres_data: